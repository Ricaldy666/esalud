openapi: "3.0.3"
info:
  title: Esalud API
  description: API del sistema de gestión estadística APS para CORMUDESI
  version: "0.2.0"
  contact:
    name: Dorian
    email: "[Por completar con Dorian]"
servers:
  - url: http://localhost:8000/api/v1
    description: Desarrollo local

paths:
  /health:
    get:
      summary: Verificar estado del servicio
      operationId: healthCheck
      tags:
        - Sistema
      responses:
        "200":
          description: Servicio operativo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_HealthData"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_Error"

  /auth/login:
    post:
      summary: Iniciar sesión
      operationId: authLogin
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
              required:
                - email
                - password
      responses:
        "200":
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_User"
        "422":
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_Error"

  /auth/me:
    get:
      summary: Obtener usuario autenticado
      operationId: authMe
      tags:
        - Autenticación
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Usuario autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_User"

  /auth/logout:
    post:
      summary: Cerrar sesión
      operationId: authLogout
      tags:
        - Autenticación
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Sesión cerrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_Null"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: laravel_session

  schemas:
    ApiResponse_HealthData:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/HealthData"
        message:
          type: string
          example: Service is healthy
        errors:
          type: "null"
      required:
        - data
        - message
        - errors

    ApiResponse_User:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/User"
        message:
          type: string
          example: Inicio de sesión exitoso
        errors:
          type: "null"
      required:
        - data
        - message
        - errors

    ApiResponse_Null:
      type: object
      properties:
        data:
          type: "null"
        message:
          type: string
          example: Sesión cerrada exitosamente
        errors:
          type: "null"
      required:
        - data
        - message
        - errors

    ApiResponse_Error:
      type: object
      properties:
        data:
          type: "null"
        message:
          type: string
          example: Error de validación
        errors:
          type: object
          nullable: true
          additionalProperties:
            type: array
            items:
              type: string
      required:
        - data
        - message
        - errors

    HealthData:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: esalud-api
        version:
          type: string
          example: 0.1.0
        timestamp:
          type: string
          format: date-time
      required:
        - status
        - service
        - version
        - timestamp

    User:
      type: object
      properties:
        id:
          type: integer
        rut:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        is_active:
          type: boolean
        health_center_id:
          type: integer
          nullable: true
        roles:
          type: array
          items:
            type: string
        last_login_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - email
        - is_active
        - roles

    HealthCenter:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code_deis:
          type: string
        type:
          type: string
          enum:
            - CESFAM
            - CECOSF
            - PSR
            - SAPU
            - SAR
            - OTRO
        address:
          type: string
          nullable: true
        commune:
          type: string
          nullable: true
        is_active:
          type: boolean
      required:
        - id
        - name
        - code_deis
        - type
