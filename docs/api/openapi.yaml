openapi: "3.0.3"
info:
  title: Esalud API
  description: API del sistema de gestión estadística APS para CORMUDESI
  version: "0.4.0-alpha"
  contact:
    name: Dorian
    email: "[Por completar con Dorian]"
servers:
  - url: http://localhost:8000/api/v1
    description: Desarrollo local

paths:
  /health:
    get:
      summary: Verificar estado del servicio
      operationId: healthCheck
      tags:
        - Sistema
      responses:
        "200":
          description: Servicio operativo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_HealthData"
        "500":
          description: Error interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_Error"

  /auth/login:
    post:
      summary: Iniciar sesión
      operationId: authLogin
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
              required:
                - email
                - password
      responses:
        "200":
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_User"
        "422":
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_Error"

  /auth/me:
    get:
      summary: Obtener usuario autenticado
      operationId: authMe
      tags:
        - Autenticación
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Usuario autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_User"

  /auth/logout:
    post:
      summary: Cerrar sesión
      operationId: authLogout
      tags:
        - Autenticación
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Sesión cerrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_Null"

  /rem-templates:
    get:
      summary: Listar plantillas REM activas
      operationId: listRemTemplates
      tags:
        - REM
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Lista de plantillas REM
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RemTemplate"
                  message:
                    type: string
                  errors:
                    type: "null"

  /rem-templates/{remTemplate}:
    get:
      summary: Obtener detalle de plantilla REM
      operationId: showRemTemplate
      tags:
        - REM
      security:
        - cookieAuth: []
      parameters:
        - name: remTemplate
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Detalle de plantilla REM (incluye config)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RemTemplateDetail"
                  message:
                    type: string
                  errors:
                    type: "null"

  /rem-uploads:
    get:
      summary: Listar cargas REM
      operationId: listRemUploads
      tags:
        - REM
      security:
        - cookieAuth: []
      parameters:
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
        - name: rem_type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: health_center_id
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Lista paginada de cargas REM
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RemUpload"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
                  message:
                    type: string
                  errors:
                    type: "null"

    post:
      summary: Subir archivo REM
      operationId: storeRemUpload
      tags:
        - REM
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                year:
                  type: integer
                month:
                  type: integer
                rem_type:
                  type: string
                health_center_id:
                  type: integer
              required:
                - file
                - year
                - month
                - rem_type
                - health_center_id
      responses:
        "201":
          description: Archivo REM cargado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RemUpload"
                  message:
                    type: string
                  errors:
                    type: "null"
        "422":
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse_Error"

  /rem-uploads/{remUpload}:
    get:
      summary: Obtener detalle de carga REM
      operationId: showRemUpload
      tags:
        - REM
      security:
        - cookieAuth: []
      parameters:
        - name: remUpload
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Detalle de carga REM con datos procesados
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RemUploadDetail"
                  message:
                    type: string
                  errors:
                    type: "null"

  /rem-uploads/{remUpload}/status:
    get:
      summary: Obtener estado de procesamiento de carga REM
      operationId: statusRemUpload
      tags:
        - REM
      security:
        - cookieAuth: []
      parameters:
        - name: remUpload
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Estado de procesamiento
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      uuid:
                        type: string
                      status:
                        type: string
                        enum: [pending, processing, success, with_errors, failed]
                      processed_at:
                        type: string
                        format: date-time
                        nullable: true
                      has_errors:
                        type: boolean
                      error_summary:
                        type: object
                        nullable: true
                        properties:
                          total_rows_processed:
                            type: integer
                          total_cells_parsed:
                            type: integer
                          total_error_cells:
                            type: integer
                      data_rows_count:
                        type: integer
                  message:
                    type: string
                  errors:
                    type: "null"

    delete:
      summary: Eliminar carga REM (soft delete)
      operationId: destroyRemUpload
      tags:
        - REM
      security:
        - cookieAuth: []
      parameters:
        - name: remUpload
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Carga REM eliminada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: "null"
                  message:
                    type: string
                  errors:
                    type: "null"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: laravel_session

  schemas:
    ApiResponse_HealthData:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/HealthData"
        message:
          type: string
          example: Service is healthy
        errors:
          type: "null"
      required:
        - data
        - message
        - errors

    ApiResponse_User:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/User"
        message:
          type: string
          example: Inicio de sesión exitoso
        errors:
          type: "null"
      required:
        - data
        - message
        - errors

    ApiResponse_Null:
      type: object
      properties:
        data:
          type: "null"
        message:
          type: string
          example: Sesión cerrada exitosamente
        errors:
          type: "null"
      required:
        - data
        - message
        - errors

    ApiResponse_Error:
      type: object
      properties:
        data:
          type: "null"
        message:
          type: string
          example: Error de validación
        errors:
          type: object
          nullable: true
          additionalProperties:
            type: array
            items:
              type: string
      required:
        - data
        - message
        - errors

    HealthData:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: esalud-api
        version:
          type: string
          example: 0.1.0
        timestamp:
          type: string
          format: date-time
      required:
        - status
        - service
        - version
        - timestamp

    User:
      type: object
      properties:
        id:
          type: integer
        rut:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        is_active:
          type: boolean
        health_center_id:
          type: integer
          nullable: true
        roles:
          type: array
          items:
            type: string
        last_login_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - email
        - is_active
        - roles

    HealthCenter:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code_deis:
          type: string
        type:
          type: string
          enum:
            - CESFAM
            - CECOSF
            - PSR
            - SAPU
            - SAR
            - OTRO
        address:
          type: string
          nullable: true
        commune:
          type: string
          nullable: true
        is_active:
          type: boolean
      required:
        - id
        - name
        - code_deis
        - type

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
      required:
        - current_page
        - last_page
        - per_page
        - total

    RemTemplate:
      type: object
      properties:
        id:
          type: integer
        year:
          type: integer
        rem_type:
          type: string
        version:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - year
        - rem_type
        - version
        - is_active

    RemTemplateDetail:
      allOf:
        - $ref: "#/components/schemas/RemTemplate"
        - type: object
          properties:
            config:
              type: object
          required:
            - config

    RemUpload:
      type: object
      properties:
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        year:
          type: integer
        month:
          type: integer
        rem_type:
          type: string
        original_filename:
          type: string
        file_size:
          type: integer
        mime_type:
          type: string
        status:
          type: string
          enum:
            - pending
            - processing
            - success
            - with_errors
            - failed
        error_report:
          type: object
          nullable: true
        health_center:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            type:
              type: string
        user:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            email:
              type: string
        rem_template:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            version:
              type: string
        processed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - uuid
        - year
        - month
        - rem_type
        - original_filename
        - file_size
        - mime_type
        - status
        - created_at

    RemUploadDetail:
      allOf:
        - $ref: "#/components/schemas/RemUpload"
        - type: object
          properties:
            rem_data:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  section:
                    type: string
                  data:
                    type: object
